<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NASA Deep Space Simulator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
background:#000;
}
canvas{display:block}

body{
background:
radial-gradient(circle at 25% 20%,#163c96 0%,transparent 30%),
radial-gradient(circle at 75% 35%,#5a1d9a 0%,transparent 30%),
radial-gradient(circle at center,#071225,#010105 75%);
}

#menu{
position:fixed;
top:12px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
max-width:95%;
z-index:50;
}

.btn{
border:none;
padding:12px 17px;
border-radius:50px;
font-weight:800;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#0f59ff,#00d4ff);
box-shadow:
0 0 18px rgba(0,255,255,.4),
inset 0 0 8px rgba(255,255,255,.4);
transition:.3s;
}
.btn:hover{
transform:scale(1.07);
box-shadow:0 0 35px cyan;
}

#title{
position:fixed;
bottom:28px;
left:35px;
z-index:50;
color:white;
font-size:30px;
font-weight:900;
letter-spacing:7px;
line-height:1.3;
text-shadow:0 0 30px cyan;
}

#load{
position:fixed;
inset:0;
z-index:99;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:900;
background:black;
color:white;
}
</style>
</head>
<body>

<div id="load">
Launching NASA Simulation...
</div>

<div id="menu">
<button class="btn" onclick="jump('solar')">☀ Tata Surya</button>
<button class="btn" onclick="jump('earth')">🌍 Bumi</button>
<button class="btn" onclick="jump('moon')">🌙 Bulan</button>
<button class="btn" onclick="jump('mars')">🔴 Mars</button>
<button class="btn" onclick="jump('jupiter')">🪐 Jupiter</button>
<button class="btn" onclick="jump('saturn')">💍 Saturnus</button>
<button class="btn" onclick="jump('nebula')">🌌 Nebula</button>
</div>

<div id="title">
NASA<br>
SPACE<br>
SIMULATOR
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>

let scene=new THREE.Scene();

let camera=
new THREE.PerspectiveCamera(
65,
innerWidth/innerHeight,
0.1,
50000
);

camera.position.set(0,120,900);

let renderer=
new THREE.WebGLRenderer({antialias:true});

renderer.setSize(
innerWidth,
innerHeight
);

renderer.setPixelRatio(
devicePixelRatio
);

document.body.appendChild(
renderer.domElement
);

let loader=
new THREE.TextureLoader();

/* LIGHTS */

scene.add(
new THREE.AmbientLight(
0x7799ff,.5
)
);

let sunLight=
new THREE.PointLight(
0xffffff,
4,
30000
);

scene.add(
sunLight
);

/* STARFIELD */

let starsGeo=
new THREE.BufferGeometry();

let verts=[];

for(let i=0;i<40000;i++){

let r=22000;

verts.push(
(Math.random()-.5)*r,
(Math.random()-.5)*r,
(Math.random()-.5)*r
);

}

starsGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(
verts,3
)
);

let stars=
new THREE.Points(
starsGeo,
new THREE.PointsMaterial({
size:2,
color:0xffffff
})
);

scene.add(stars);

/* NEBULA */

let nebula=
new THREE.Mesh(
new THREE.TorusKnotGeometry(
260,60,180,32
),
new THREE.MeshBasicMaterial({
wireframe:true,
color:0aaaff
})
);

nebula.position.set(
-1800,
500,
-2000
);

scene.add(nebula);

/* TEXTURES */

let sunTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/solar/sun.jpg'
);

let earthTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg'
);

let moonTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/moon.jpg'
);

let marsTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/mars_1k_color.jpg'
);

let jupiterTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/jupiter.jpg'
);

let saturnTex=loader.load(
'https://threejsfundamentals.org/threejs/resources/images/saturn.jpg'
);

/* PLANETS */

function makePlanet(
size,
tex,
dist
){
let p=
new THREE.Mesh(
new THREE.SphereGeometry(
size,
160,
160
),
new THREE.MeshStandardMaterial({
map:tex
})
);
p.position.x=dist;
scene.add(p);
return p;
}

let sun=
new THREE.Mesh(
new THREE.SphereGeometry(
70,180,180
),
new THREE.MeshBasicMaterial({
map:sunTex
})
);

scene.add(sun);

let earth=
makePlanet(
24,
earthTex,
350
);

let moon=
makePlanet(
7,
moonTex,
390
);

let mars=
makePlanet(
19,
marsTex,
540
);

let jupiter=
makePlanet(
50,
jupiterTex,
840
);

let saturn=
makePlanet(
43,
saturnTex,
1200
);

let ring=
new THREE.Mesh(
new THREE.RingGeometry(
55,85,200
),
new THREE.MeshBasicMaterial({
color:0xe6d39a,
side:THREE.DoubleSide
})
);

ring.rotation.x=1.5;
saturn.add(ring);

/* CAMERA TARGET */

let targets={
solar:new THREE.Vector3(
0,170,1200
),

earth:new THREE.Vector3(
450,35,120
),

moon:new THREE.Vector3(
450,15,60
),

mars:new THREE.Vector3(
650,25,100
),

jupiter:new THREE.Vector3(
1050,60,180
),

saturn:new THREE.Vector3(
1450,70,200
),

nebula:new THREE.Vector3(
-1500,
550,
-1300
)
};

let fly=
targets.solar.clone();

function jump(v){
fly=
targets[v].clone();
}

/* DRAG */

let drag=false;
let px=0;
let py=0;
let ry=0;
let rx=.15;

addEventListener(
"mousedown",
e=>{
drag=true;
px=e.clientX;
py=e.clientY;
}
);

addEventListener(
"mouseup",
()=>drag=false
);

addEventListener(
"mousemove",
e=>{
if(!drag)return;

ry+=(e.clientX-px)*0.005;
rx+=(e.clientY-py)*0.003;

px=e.clientX;
py=e.clientY;
}
);

addEventListener(
"wheel",
e=>{
camera.position.z+=
e.deltaY*.25
}
);

addEventListener(
"resize",
()=>{
camera.aspect=
innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(
innerWidth,
innerHeight
)
}
);

/* ANIMATE */

function animate(){

requestAnimationFrame(
animate
);

/* orbits */

earth.position.x=
Math.cos(Date.now()*0.0006)*350;

earth.position.z=
Math.sin(Date.now()*0.0006)*350;


moon.position.x=
earth.position.x+
Math.cos(Date.now()*0.003)*45;

moon.position.z=
earth.position.z+
Math.sin(Date.now()*0.003)*45;


mars.position.x=
Math.cos(Date.now()*0.0004)*540;
mars.position.z=
Math.sin(Date.now()*0.0004)*540;


jupiter.position.x=
Math.cos(Date.now()*0.0002)*840;
jupiter.position.z=
Math.sin(Date.now()*0.0002)*840;


saturn.position.x=
Math.cos(Date.now()*0.00015)*1200;
saturn.position.z=
Math.sin(Date.now()*0.00015)*1200;


/* spins */

sun.rotation.y+=0.002;

earth.rotation.y+=0.01;
moon.rotation.y+=0.008;
mars.rotation.y+=0.006;
jupiter.rotation.y+=0.018;
saturn.rotation.y+=0.013;

stars.rotation.y+=0.00008;

nebula.rotation.x+=0.0004;
nebula.rotation.y+=0.0007;


/* fly camera */

camera.position.lerp(
fly,
.018
);

camera.lookAt(
0,0,0
);

scene.rotation.y+=
(ry-scene.rotation.y)*.03;

scene.rotation.x+=
(rx-scene.rotation.x)*.03;

renderer.render(
scene,
camera
);

}

animate();

setTimeout(()=>{
document.getElementById(
'load'
).style.display='none';
},2500);

</script>
</body>
</html>
